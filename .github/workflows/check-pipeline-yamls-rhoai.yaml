---
# Verify committed managed pipeline.yaml artifacts on RHOAI release branches.
#
# Resolves runtime digests from quay.io/rhoai/odh-*-rhel9:<release-branch>, compiles with
# registry.redhat.io/rhoai/odh-*-rhel9@<digest> via RELATED_IMAGE_ODH_* env vars, and fails
# if pipelines/**/pipeline.yaml differs from git. Does not commit or push.

name: Check pipeline YAMLs

on:
  push:
    branches:
      - rhoai-3.5-ea.2
    paths:
      - components/**
      - pipelines/**/pipeline.py
      - pipelines/**/metadata.yaml
      - pipelines/**/Containerfile
      - pipelines/**/requirements*.txt
      - scripts/generate_managed_pipelines/**
      - scripts/lib/**
      - utils/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/check-pipeline-yamls-rhoai.yaml
  pull_request:
    branches:
      - rhoai-3.5-ea.2
    paths:
      - components/**
      - pipelines/**/pipeline.py
      - pipelines/**/metadata.yaml
      - pipelines/**/pipeline.yaml
      - pipelines/**/Containerfile
      - pipelines/**/requirements*.txt
      - scripts/generate_managed_pipelines/**
      - scripts/lib/**
      - utils/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/check-pipeline-yamls-rhoai.yaml
  workflow_dispatch:
    inputs:
      release_branch:
        description: Release branch name (Quay image tag)
        required: false
        default: rhoai-3.5-ea.2
        type: string

concurrency:
  group: check-pipeline-yamls-${{ github.event_name == 'workflow_dispatch' && inputs.release_branch || github.base_ref || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_BRANCH: >-
    ${{ github.event_name == 'workflow_dispatch' && inputs.release_branch || github.base_ref || github.ref_name }}
  QUAY_AUTOML: quay.io/rhoai/odh-automl-rhel9
  QUAY_AUTORAG: quay.io/rhoai/odh-autorag-rhel9
  RH_AUTOML: registry.redhat.io/rhoai/odh-automl-rhel9
  RH_AUTORAG: registry.redhat.io/rhoai/odh-autorag-rhel9

jobs:
  check:
    name: Check pipeline.yaml artifacts
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Resolve runtime image digests from Quay
        id: images
        run: |
          set -euo pipefail
          tag="${RELEASE_BRANCH}"
          max_attempts=12
          sleep_seconds=300

          resolve_digest() {
            local image="$1"
            local attempt=1
            while true; do
              if digest=$(skopeo inspect --format '{{.Digest}}' "docker://${image}:${tag}" 2>/dev/null); then
                echo "${digest}"
                return 0
              fi
              if [[ "${attempt}" -ge "${max_attempts}" ]]; then
                echo "Failed to resolve digest for ${image}:${tag} after ${max_attempts} attempts" >&2
                return 1
              fi
              echo "Image ${image}:${tag} not ready (attempt ${attempt}/${max_attempts}); waiting ${sleep_seconds}s..." >&2
              sleep "${sleep_seconds}"
              attempt=$((attempt + 1))
            done
          }

          automl_digest=$(resolve_digest "${QUAY_AUTOML}")
          autorag_digest=$(resolve_digest "${QUAY_AUTORAG}")

          echo "automl_digest=${automl_digest}" >> "${GITHUB_OUTPUT}"
          echo "autorag_digest=${autorag_digest}" >> "${GITHUB_OUTPUT}"
          echo "Resolved AutoML: ${QUAY_AUTOML}:${tag} -> ${RH_AUTOML}@${automl_digest}"
          echo "Resolved AutoRAG: ${QUAY_AUTORAG}:${tag} -> ${RH_AUTORAG}@${autorag_digest}"

      - name: Setup Python CI
        uses: ./.github/actions/setup-python-ci
        with:
          python-version: "3.11"

      - name: Verify managed pipeline YAMLs match release images
        env:
          RELATED_IMAGE_ODH_AUTOML_IMAGE: ${{ env.RH_AUTOML }}@${{ steps.images.outputs.automl_digest }}
          RELATED_IMAGE_ODH_AUTORAG_IMAGE: ${{ env.RH_AUTORAG }}@${{ steps.images.outputs.autorag_digest }}
        run: |
          set -euo pipefail

          uv run python -m scripts.generate_managed_pipelines.generate_managed_pipelines \
            -o "${RUNNER_TEMP}/managed-pipelines.json"

          mapfile -t yaml_files < <(find pipelines -name pipeline.yaml | sort)
          if git diff --quiet -- "${yaml_files[@]}"; then
            echo "Managed pipeline YAMLs are up to date for ${RELEASE_BRANCH}."
            exit 0
          fi

          echo "::error::Committed pipeline.yaml files do not match compile output for ${RELEASE_BRANCH}."
          git diff --stat -- "${yaml_files[@]}"
          echo ""
          echo "Current release runtime images (${RELEASE_BRANCH}):"
          echo "  ${RELATED_IMAGE_ODH_AUTOML_IMAGE}"
          echo "  ${RELATED_IMAGE_ODH_AUTORAG_IMAGE}"

          git checkout -- "${yaml_files[@]}"
          exit 1
