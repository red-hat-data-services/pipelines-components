apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/pipelines-components?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    build.appstudio.openshift.io/build-nudge-files: "build/operator-nudging.yaml"
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "push"
      && target_branch == "rhoai-3.5-ea.1"
      && ( files.all.exists(p, !p.matches('^\\.tekton/'))
        || ".tekton/odh-autorag-v3-5-ea-1-push.yaml".pathChanged()
        || "Dockerfile.konflux.autorag".pathChanged() )
  labels:
    appstudio.openshift.io/application: rhoai-v3-5-ea-1
    appstudio.openshift.io/component: odh-autorag-v3-5-ea-1
    pipelines.appstudio.openshift.io/type: build
  name: odh-autorag-v3-5-ea-1-on-push
  namespace: rhoai-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: additional-tags
    value:
    - '{{target_branch}}-{{revision}}'
  - name: output-image
    value: quay.io/rhoai/odh-autorag-rhel9:{{target_branch}}
  - name: rhoai-version
    value: "3.5.0-ea.1"
  - name: build-platforms
    value:
    - linux/x86_64
    - linux-m2xlarge/arm64
    - linux/ppc64le
    - linux/s390x
  - name: dockerfile
    value: Dockerfile.konflux.autorag
  - name: path-context
    value: .
  - name: hermetic
    value: 'true'
  - name: prefetch-input
    value:
        [
          {
            "type": "pip",
            "path": "pipelines/training/autorag",
            "requirements_files": [
              "documents_rag_optimization_pipeline/requirements.txt",
              "documents_rag_optimization_pipeline/requirements-pypi-whl.txt"
            ],
            "binary": {"arch": ":all:"}
          },
          {
            "type": "pip",
            "path": "pipelines/training/autorag/documents_rag_optimization_pipeline",
            "requirements_files": [
              "requirements-pypi.txt"
            ]
          },
          {
            "type": "generic",
            "path": "pipelines/training/autorag/documents_rag_optimization_pipeline",
            "lockfile": "artifacts.lock.yaml"
          }
        ]
  - name: build-source-image
    value: true
  - name: build-image-index
    value: true
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/red-hat-data-services/konflux-central.git
    - name: revision
      value: '{{ target_branch }}'
    - name: pathInRepo
      value: pipelines/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-autorag-v3-5-ea-1
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}

