apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/pipelines-components?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    build.appstudio.openshift.io/build-nudge-files: "build/operator-nudging.yaml"
    pipelinesascode.tekton.dev/on-event: "[pull_request]"
    pipelinesascode.tekton.dev/on-target-branch: "[rhoai-3.4]"
  labels:
    appstudio.openshift.io/application: rhoai-v3-4
    appstudio.openshift.io/component: odh-pipelines-components-v3-4
    pipelines.appstudio.openshift.io/type: build
  name: odh-pipelines-components-v3-4-pull-request
  namespace: rhoai-tenant
spec:
  params:
    - name: git-url
      value: '{{source_url}}'
    - name: revision
      value: '{{revision}}'
    - name: output-image
      value: quay.io/rhoai/pull-request-pipelines:odh-pipelines-components-{{revision}}
    - name: image-expires-after
      value: 5d
    - name: rhoai-version
      value: "3.4.0"
    - name: dockerfile
      value: Dockerfile.konflux.pipelines-components
    - name: path-context
      value: .
    - name: hermetic
      value: 'true'
    - name: prefetch-input
      value: >-
        {"type": "pip", "path": ".",
        "requirements_files": ["requirements.txt"],
        "requirements_build_files": ["requirements-build.txt"],
        "binary": {"arch": ":all:"}}
    - name: build-source-image
      value: true
    - name: build-image-index
      value: true
    # pipelines-components is TechPreview in 3.4 and s390x will need extra work - https://redhat.atlassian.net/browse/RHOAIENG-58421
    - name: build-platforms
      value:
        - linux/x86_64
        - linux-m2xlarge/arm64
        - linux/ppc64le
    - name: enable-slack-failure-notification
      value: "false"
  pipelineRef:
    resolver: git
    params:
      - name: url
        value: https://github.com/red-hat-data-services/konflux-central.git
      - name: revision
        value: '{{ target_branch }}'
      - name: pathInRepo
        value: pipelines/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-pull-request-pipelines
  workspaces:
    - name: git-auth
      secret:
        secretName: '{{git_auth_secret}}'
status: {}
