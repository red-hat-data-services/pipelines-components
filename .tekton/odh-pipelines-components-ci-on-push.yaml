apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/opendatahub-io/pipelines-components?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch
      == "main"
  creationTimestamp: null
  labels:
    # Use rhoai-v3-5-ea-2 application because it's the current release branch
    # that gets synced daily from RHDS main, allowing main branch builds
    # to use the existing release infrastructure
    appstudio.openshift.io/application: rhoai-v3-5-ea-2
    appstudio.openshift.io/component: odh-pipelines-components-v3-5-ea-2
    pipelines.appstudio.openshift.io/type: build
  name: odh-pipelines-components-ci-on-push
  namespace: rhoai-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/opendatahub/odh-pipelines-components:odh-stable
  - name: dockerfile
    value: Dockerfile.konflux.pipelines-components
  - name: path-context
    value: .
  - name: build-platforms
    value:
      - linux/x86_64
      - linux/aarch64
  - name: hermetic
    value: 'true'
  - name: prefetch-input
    value: >-
      {"type": "pip", "path": ".",
      "requirements_files": ["requirements.txt"],
      "requirements_build_files": ["requirements-build.txt"],
      "binary": {"arch": ":all:"}}
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/red-hat-data-services/konflux-central.git
    - name: revision
      value: '{{ target_branch }}'
    - name: pathInRepo
      value: pipelines/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-pull-request-pipelines
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
