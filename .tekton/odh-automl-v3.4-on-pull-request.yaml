apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/pipelines-components?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "pull_request"
      && target_branch == "rhoai-3.4"
      && ( (files.all.exists(p, !p.matches('^\\.tekton/'))
        && !files.all.exists(
          p,
          p.matches('(^|/)pipeline\\.yaml$')
          || (p.matches('^Dockerfile\\.konflux\\.')
          && !p.matches('^Dockerfile\\.konflux\\.automl$'))))
        || ".tekton/odh-automl-v3-4-push.yaml".pathChanged()
        || "Dockerfile.konflux.automl".pathChanged() )
  labels:
    appstudio.openshift.io/application: rhoai-v3-4
    appstudio.openshift.io/component: odh-automl-v3-4
    pipelines.appstudio.openshift.io/type: build
  name: odh-automl-v3-4-on-pull-request
  namespace: rhoai-tenant
spec:
  timeouts:
    pipeline: 8h
    tasks: 4h
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: additional-tags
    value:
    - 'pr-{{pull_request_number}}-into-{{target_branch}}'
  - name: additional-labels
    value:
    - version=on-pr-{{revision}}
    - io.openshift.tags=odh-automl
  - name: output-image
    value: quay.io/rhoai/pull-request-pipelines:odh-automl-{{revision}}
  - name: rhoai-version
    value: "3.4.2"
  - name: build-platforms
    value:
    - linux/x86_64
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: Dockerfile.konflux.automl
  - name: path-context
    value: .
  - name: hermetic
    value: 'false'
  - name: prefetch-input
    value:
        [
          {
            "type": "pip",
            "path": "pipelines/training/automl",
            "requirements_files": [
              "autogluon_tabular_training_pipeline/requirements.txt"
            ],
            "binary": {"arch": ":all:"}
          }
        ]
  - name: build-source-image
    value: true
  - name: build-image-index
    value: true
  - name: enable-slack-failure-notification
    value: "false"
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/red-hat-data-services/konflux-central.git
    - name: revision
      value: '{{ target_branch }}'
    - name: pathInRepo
      value: pipelines/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-automl-v3-4
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
