# PIPELINE DEFINITION
# Name: autogluon-timeseries-training-pipeline
# Description: End-to-end AutoGluon time series forecasting pipeline. Loads time series data from S3 in TimeSeriesDataFrame format (item_id, timestamp, target), trains multiple AutoGluon TimeSeries models (local statistical and global deep learning), ranks them by the chosen eval metric, and produces a leaderboard and the top N trained predictors for deployment. Supports optional known covariates and configurable prediction_length.
# Inputs:
#    id_column: str
#    known_covariates_names: list
#    prediction_length: int [Default: 1.0]
#    target: str
#    timestamp_column: str
#    top_n: int [Default: 3.0]
#    train_data_bucket_name: str
#    train_data_file_key: str
#    train_data_secret_name: str
components:
  comp-autogluon-timeseries-models-training:
    executorLabel: exec-autogluon-timeseries-models-training
    inputDefinitions:
      artifacts:
        test_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Test dataset artifact for evaluation.
      parameters:
        extra_train_data_path:
          defaultValue: ''
          description: Path to extra train split for full refit.
          isOptional: true
          parameterType: STRING
        id_column:
          description: Name of the column identifying each time series (item_id).
          parameterType: STRING
        known_covariates_names:
          description: Optional list of known covariate column names.
          isOptional: true
          parameterType: LIST
        pipeline_name:
          description: Pipeline name used in generated notebook placeholders.
          parameterType: STRING
        prediction_length:
          defaultValue: 1.0
          description: Forecast horizon (number of timesteps).
          isOptional: true
          parameterType: NUMBER_INTEGER
        run_id:
          description: Pipeline run id used in generated notebook placeholders.
          parameterType: STRING
        sample_rows:
          defaultValue: '[]'
          description: Optional sample rows JSON string used in generated notebook
            placeholders.
          isOptional: true
          parameterType: STRING
        sampling_config:
          description: Optional sampling config stored in artifact metadata.
          isOptional: true
          parameterType: STRUCT
        split_config:
          description: Optional split config stored in artifact metadata.
          isOptional: true
          parameterType: STRUCT
        target:
          description: Name of the target column to forecast.
          parameterType: STRING
        timestamp_column:
          description: Name of the timestamp/datetime column.
          parameterType: STRING
        top_n:
          description: Number of top models to select for full refit.
          parameterType: NUMBER_INTEGER
        train_data_path:
          description: Path to the selection training CSV file.
          parameterType: STRING
        workspace_path:
          description: Workspace directory where predictor will be saved.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        models_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        eval_metric:
          parameterType: STRING
        model_config:
          parameterType: STRUCT
        predictor_path:
          parameterType: STRING
        top_models:
          parameterType: LIST
  comp-leaderboard-evaluation:
    executorLabel: exec-leaderboard-evaluation
    inputDefinitions:
      artifacts:
        models_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
          description: 'Combined Model artifact from ``autogluon_models_training``

            with ``metadata["model_names"]`` and per-model subdirectories.'
      parameters:
        eval_metric:
          description: 'Metric name for ranking (e.g. ``"accuracy"``, ``"root_mean_squared_error"``);

            leaderboard sorted descending (AutoGluon uses higher-is-better convention).'
          parameterType: STRING
    outputDefinitions:
      artifacts:
        html_artifact:
          artifactType:
            schemaTitle: system.HTML
            schemaVersion: 0.0.1
      parameters:
        best_model:
          parameterType: STRING
  comp-timeseries-data-loader:
    executorLabel: exec-timeseries-data-loader
    inputDefinitions:
      parameters:
        bucket_name:
          description: S3 bucket name containing the file.
          parameterType: STRING
        file_key:
          description: S3 object key of the CSV file containing time series data.
          parameterType: STRING
        id_column:
          description: Name of the column identifying each time series (item_id).
          parameterType: STRING
        selection_train_size:
          defaultValue: 0.3
          description: 'Fraction of train portion for model selection (default: 0.3).'
          isOptional: true
          parameterType: NUMBER_DOUBLE
        target:
          description: Name of the target column to forecast.
          parameterType: STRING
        timestamp_column:
          description: Name of the timestamp/datetime column.
          parameterType: STRING
        workspace_path:
          description: PVC workspace directory where train CSVs will be written.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        sampled_test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        extra_train_data_path:
          parameterType: STRING
        models_selection_train_data_path:
          parameterType: STRING
        sample_config:
          parameterType: STRUCT
        sample_rows:
          parameterType: STRING
        split_config:
          parameterType: STRUCT
deploymentSpec:
  executors:
    exec-autogluon-timeseries-models-training:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - autogluon_timeseries_models_training
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\n__KFP_EMBEDDED_ARCHIVE_B64 = ''\n\
          \nimport base64 as __kfp_b64\nimport io as __kfp_io\nimport os as __kfp_os\n\
          import sys as __kfp_sys\nimport tarfile as __kfp_tarfile\nimport tempfile\
          \ as __kfp_tempfile\n\n# Extract embedded archive at import time to ensure\
          \ sys.path and globals are set\n__kfp_tmpdir = __kfp_tempfile.TemporaryDirectory()\n\
          __KFP_EMBEDDED_ASSET_DIR = __kfp_tmpdir.name\ntry:\n    __kfp_bytes = __kfp_b64.b64decode(__KFP_EMBEDDED_ARCHIVE_B64.encode('ascii'))\n\
          \    with __kfp_tarfile.open(fileobj=__kfp_io.BytesIO(__kfp_bytes), mode='r:gz')\
          \ as __kfp_tar:\n        __kfp_tar.extractall(path=__KFP_EMBEDDED_ASSET_DIR)\n\
          except Exception as __kfp_e:\n    raise RuntimeError(f'Failed to extract\
          \ embedded archive: {__kfp_e}')\n\n# Always prepend the extracted directory\
          \ to sys.path for import resolution\nif __KFP_EMBEDDED_ASSET_DIR not in\
          \ __kfp_sys.path:\n    __kfp_sys.path.insert(0, __KFP_EMBEDDED_ASSET_DIR)\n\
          \n\n\n\ndef autogluon_timeseries_models_training(\n    target: str,\n  \
          \  id_column: str,\n    timestamp_column: str,\n    train_data_path: str,\n\
          \    test_data: dsl.Input[dsl.Dataset],\n    top_n: int,\n    workspace_path:\
          \ str,\n    pipeline_name: str,\n    run_id: str,\n    models_artifact:\
          \ dsl.Output[dsl.Model] = None,\n    notebooks: dsl.EmbeddedInput[dsl.Dataset]\
          \ = None,\n    sample_rows: str = \"[]\",\n    sampling_config: Optional[dict]\
          \ = None,\n    split_config: Optional[dict] = None,\n    extra_train_data_path:\
          \ str = \"\",\n    prediction_length: int = 1,\n    known_covariates_names:\
          \ Optional[List[str]] = None,\n) -> NamedTuple(\n    \"outputs\",\n    top_models=List[str],\n\
          \    predictor_path=str,\n    eval_metric=str,\n    model_config=dict,\n\
          ):\n    \"\"\"Train, select, and full-refit top N AutoGluon timeseries models.\n\
          \n    This component combines model generation and full-refit into one step\
          \ to avoid\n    pipeline-level ``ParallelFor``. It trains multiple AutoGluon\
          \ TimeSeries models on\n    the selection training data, ranks them on the\
          \ test set, then sequentially refits\n    the top N models on full train\
          \ data (selection split + extra split).\n\n    Refit outputs for all selected\
          \ models are written under one ``models_artifact`` in\n    a layout compatible\
          \ with ``autogluon_leaderboard_evaluation``.\n\n    Args:\n        target:\
          \ Name of the target column to forecast.\n        id_column: Name of the\
          \ column identifying each time series (item_id).\n        timestamp_column:\
          \ Name of the timestamp/datetime column.\n        train_data_path: Path\
          \ to the selection training CSV file.\n        test_data: Test dataset artifact\
          \ for evaluation.\n        top_n: Number of top models to select for full\
          \ refit.\n        workspace_path: Workspace directory where predictor will\
          \ be saved.\n        models_artifact: Combined output artifact containing\
          \ all refitted models.\n        notebooks: Embedded notebook templates.\n\
          \        pipeline_name: Pipeline name used in generated notebook placeholders.\n\
          \        run_id: Pipeline run id used in generated notebook placeholders.\n\
          \        sample_rows: Optional sample rows JSON string used in generated\
          \ notebook placeholders.\n        sampling_config: Optional sampling config\
          \ stored in artifact metadata.\n        split_config: Optional split config\
          \ stored in artifact metadata.\n        extra_train_data_path: Path to extra\
          \ train split for full refit.\n        prediction_length: Forecast horizon\
          \ (number of timesteps).\n        known_covariates_names: Optional list\
          \ of known covariate column names.\n\n    Returns:\n        NamedTuple:\
          \ top_models list, predictor_path, eval_metric, model_config.\n    \"\"\"\
          \n    import json\n    import logging\n    import math\n    import os\n\
          \    from pathlib import Path\n\n    import pandas as pd\n    from autogluon.timeseries\
          \ import TimeSeriesDataFrame, TimeSeriesPredictor\n\n    logger = logging.getLogger(__name__)\n\
          \n    # Set constants\n    DEFAULT_PRESETS = \"fast_training\"\n    DEFAULT_EVAL_METRIC\
          \ = \"MASE\"\n    DEFAULT_TIME_LIMIT = 600  # 10 minutes\n\n    TOP_N_MAX\
          \ = 7\n\n    # Input validation\n    for param, value in (\n        (\"\
          target\", target),\n        (\"id_column\", id_column),\n        (\"timestamp_column\"\
          , timestamp_column),\n        (\"train_data_path\", train_data_path),\n\
          \        (\"workspace_path\", workspace_path),\n    ):\n        if not isinstance(value,\
          \ str) or not value.strip():\n            raise TypeError(f\"{param} must\
          \ be a non-empty string.\")\n    if not isinstance(top_n, int):\n      \
          \  raise TypeError(\"top_n must be an integer.\")\n    if top_n <= 0 or\
          \ top_n > TOP_N_MAX:\n        raise ValueError(f\"top_n must be an integer\
          \ in the range (0, {TOP_N_MAX}]; got {top_n}.\")\n    if not isinstance(prediction_length,\
          \ int):\n        raise TypeError(\"prediction_length must be an integer.\"\
          )\n    if prediction_length <= 0:\n        raise ValueError(\"prediction_length\
          \ must be greater than 0.\")\n    if known_covariates_names is not None:\n\
          \        if not isinstance(known_covariates_names, list) or any(\n     \
          \       (not isinstance(v, str) or not v.strip()) for v in known_covariates_names\n\
          \        ):\n            raise TypeError(\"known_covariates_names must be\
          \ a list of non-empty strings or None.\")\n    for param, value in (\n \
          \       (\"pipeline_name\", pipeline_name),\n        (\"run_id\", run_id),\n\
          \    ):\n        if not isinstance(value, str) or not value.strip():\n \
          \           raise TypeError(f\"{param} must be a non-empty string.\")\n\
          \    if not isinstance(sample_rows, str):\n        raise TypeError(\"sample_rows\
          \ must be a string.\")\n    if models_artifact is not None and not hasattr(models_artifact,\
          \ \"path\"):\n        raise TypeError(\"models_artifact must be a KFP output\
          \ artifact or None.\")\n    if notebooks is not None and not hasattr(notebooks,\
          \ \"path\"):\n        raise TypeError(\"notebooks must be a KFP embedded\
          \ artifact or None.\")\n    if sampling_config is not None and not isinstance(sampling_config,\
          \ dict):\n        raise TypeError(\"sampling_config must be a dictionary\
          \ or None.\")\n    if split_config is not None and not isinstance(split_config,\
          \ dict):\n        raise TypeError(\"split_config must be a dictionary or\
          \ None.\")\n    if not isinstance(extra_train_data_path, str):\n       \
          \ raise TypeError(\"extra_train_data_path must be a string.\")\n    sampling_config\
          \ = sampling_config or {}\n    split_config = split_config or {}\n\n   \
          \ train_df = pd.read_csv(train_data_path)\n    test_df = pd.read_csv(test_data.path)\n\
          \    logger.info(\"Loaded train=%s test=%s rows\", len(train_df), len(test_df))\n\
          \n    train_ts = TimeSeriesDataFrame.from_data_frame(\n        train_df,\n\
          \        id_column=id_column,\n        timestamp_column=timestamp_column,\n\
          \    )\n    logger.info(\"Train TimeSeriesDataFrame: %s rows, %s items\"\
          , len(train_ts), train_ts.num_items)\n\n    # Convert test data to TimeSeriesDataFrame\n\
          \    test_ts = TimeSeriesDataFrame.from_data_frame(\n        test_df,\n\
          \        id_column=id_column,\n        timestamp_column=timestamp_column,\n\
          \    )\n\n    # Create predictor path in workspace\n    predictor_path =\
          \ Path(workspace_path) / \"timeseries_predictor\"\n\n    eval_metric = DEFAULT_EVAL_METRIC\n\
          \    # Create TimeSeriesPredictor\n    predictor = TimeSeriesPredictor(\n\
          \        prediction_length=prediction_length,\n        target=target,\n\
          \        eval_metric=eval_metric,\n        path=str(predictor_path),\n \
          \       verbosity=2,\n        known_covariates_names=known_covariates_names,\n\
          \    )\n\n    logger.info(\n        \"Timeseries selection: training (preset=%s,\
          \ time_limit=%ss, prediction_length=%s)...\",\n        DEFAULT_PRESETS,\n\
          \        DEFAULT_TIME_LIMIT,\n        prediction_length,\n    )\n    try:\n\
          \        predictor.fit(\n            train_data=train_ts,\n            presets=DEFAULT_PRESETS,\n\
          \            time_limit=DEFAULT_TIME_LIMIT,\n            # exclude deep\
          \ learning models pretrained on large time series datasets\n           \
          \ excluded_model_types=[\"Chronos\", \"Toto\", \"Chronos2\"],\n        )\n\
          \    except Exception as e:\n        logger.error(f\"Training failed: {str(e)}\"\
          )\n        raise ValueError(f\"TimeSeriesPredictor training failed: {str(e)}\"\
          ) from e\n\n    try:\n        leaderboard = predictor.leaderboard(test_ts)\n\
          \    except Exception as e:\n        logger.error(f\"Leaderboard generation\
          \ failed: {str(e)}\")\n        raise ValueError(f\"Failed to generate leaderboard:\
          \ {str(e)}\") from e\n\n    if top_n > len(leaderboard):\n        raise\
          \ ValueError(\n            f\"top_n must be less than or equal to number_of_models_trained\
          \ ({len(leaderboard)}); got {top_n}.\"\n        )\n\n    top_models = leaderboard.head(top_n)[\"\
          model\"].values.tolist()\n    logger.info(\n        \"Timeseries selection\
          \ done: top_%s=%s best_score_test=%s\",\n        top_n,\n        top_models,\n\
          \        leaderboard.iloc[0][\"score_test\"],\n    )\n\n    # Create model\
          \ config\n    model_config = {\n        \"prediction_length\": prediction_length,\n\
          \        \"eval_metric\": eval_metric,\n        \"target\": target,\n  \
          \      \"id_column\": id_column,\n        \"timestamp_column\": timestamp_column,\n\
          \        \"presets\": DEFAULT_PRESETS,\n        \"time_limit\": DEFAULT_TIME_LIMIT,\n\
          \        \"known_covariates_names\": known_covariates_names or [],\n   \
          \     \"num_models_trained\": len(leaderboard),\n    }\n\n    # Stage 2:\
          \ Full refit of selected models on full train data (selection + extra).\n\
          \    if models_artifact is None or notebooks is None or not extra_train_data_path.strip():\n\
          \        logger.info(\n            \"Skipping combined full-refit stage;\
          \ missing models_artifact/notebooks or extra_train_data_path. \"\n     \
          \       \"Returning selection-only outputs for backward compatibility.\"\
          \n        )\n        outputs = NamedTuple(\n            \"outputs\",\n \
          \           top_models=List[str],\n            predictor_path=str,\n   \
          \         eval_metric=str,\n            model_config=dict,\n        )\n\
          \        return outputs(\n            top_models=top_models,\n         \
          \   predictor_path=str(predictor_path),\n            eval_metric=eval_metric,\n\
          \            model_config=model_config,\n        )\n    from autogluon.timeseries.metrics\
          \ import AVAILABLE_METRICS\n    from autogluon.timeseries.models.ensemble\
          \ import AbstractTimeSeriesEnsembleModel\n\n    selection_ts_df = train_ts\n\
          \    extra_train_ts_df = TimeSeriesDataFrame.from_path(\n        path=extra_train_data_path,\n\
          \        id_column=id_column,\n        timestamp_column=timestamp_column,\n\
          \    )\n    full_train_ts_df = TimeSeriesDataFrame(pd.concat([selection_ts_df,\
          \ extra_train_ts_df], axis=0))\n    model_hyperparams = predictor.fit_summary()[\"\
          model_hyperparams\"]\n\n    sample_row_list = json.loads(sample_rows or\
          \ \"[]\")\n    if not isinstance(sample_row_list, list):\n        raise\
          \ ValueError(\"sample_rows must be a JSON list.\")\n\n    def retrieve_pipeline_name(name:\
          \ str) -> str:\n        if not name:\n            return name\n        trimmed_name\
          \ = name.rstrip(\"-\")\n        if \"-\" not in trimmed_name:\n        \
          \    return trimmed_name\n        tokens = trimmed_name.split(\"-\")\n \
          \       return \"-\".join(tokens[:-1]) if len(tokens) > 1 else tokens[0]\n\
          \n    pipeline_name_trimmed = retrieve_pipeline_name(pipeline_name)\n  \
          \  model_names_full = []\n    models_metadata = []\n\n    def replace_placeholder_in_notebook(notebook,\
          \ replacements):\n        for cell in notebook.get(\"cells\", []):\n   \
          \         if cell.get(\"cell_type\") != \"code\":\n                continue\n\
          \            new_source = []\n            for line in cell.get(\"source\"\
          , []):\n                for placeholder, value in replacements.items():\n\
          \                    line = line.replace(placeholder, value)\n         \
          \       new_source.append(line)\n            cell[\"source\"] = new_source\n\
          \        return notebook\n\n    for model_name in top_models:\n        model_name_full\
          \ = f\"{model_name}_FULL\"\n        model_names_full.append(model_name_full)\n\
          \        output_path = Path(models_artifact.path) / model_name_full\n  \
          \      output_path.mkdir(parents=True, exist_ok=True)\n        predictor_output\
          \ = output_path / \"predictor\"\n\n        model_type = predictor._trainer.get_model_attribute(model_name,\
          \ \"type\")\n        is_ensemble = issubclass(model_type, AbstractTimeSeriesEnsembleModel)\n\
          \        hyperparams_option = \"ensemble_hyperparameters\" if is_ensemble\
          \ else \"hyperparameters\"\n        additional_fit_params = {hyperparams_option:\
          \ {model_name: model_hyperparams[model_name]}}\n\n        predictor_refit\
          \ = TimeSeriesPredictor(\n            prediction_length=prediction_length,\n\
          \            target=target,\n            eval_metric=eval_metric,\n    \
          \        path=predictor_output,\n            verbosity=2,\n            known_covariates_names=known_covariates_names,\n\
          \        )\n        predictor_refit.fit(\n            train_data=full_train_ts_df,\n\
          \            **additional_fit_params,\n            time_limit=DEFAULT_TIME_LIMIT,\n\
          \            excluded_model_types=[\"Chronos\", \"Chronos2\", \"Toto\"],\n\
          \        )\n        predictor_refit.save()\n        metrics = predictor_refit.evaluate(test_ts,\
          \ metrics=list(AVAILABLE_METRICS.keys()))\n\n        metrics_dict = {\n\
          \            k: float(v) if hasattr(v, \"item\") else v\n            for\
          \ k, v in metrics.items()\n            if not (isinstance(v, float) and\
          \ (math.isnan(v) or math.isinf(v)))\n        }\n\n        metrics_path =\
          \ output_path / \"metrics\"\n        metrics_path.mkdir(parents=True, exist_ok=True)\n\
          \        with (metrics_path / \"metrics.json\").open(\"w\", encoding=\"\
          utf-8\") as f:\n            json.dump(metrics_dict, f, indent=2)\n\n   \
          \     notebook_file = \"timeseries_notebook.ipynb\"\n        with open(os.path.join(notebooks.path,\
          \ notebook_file), \"r\", encoding=\"utf-8\") as f:\n            notebook\
          \ = json.load(f)\n        replacements = {\n            \"<REPLACE_RUN_ID>\"\
          : run_id,\n            \"<REPLACE_PIPELINE_NAME>\": pipeline_name_trimmed,\n\
          \            \"<REPLACE_MODEL_NAME>\": model_name_full,\n            \"\
          <REPLACE_SAMPLE_ROW>\": str(sample_row_list),\n            \"<REPLACE_ID_COLUMN>\"\
          : id_column,\n            \"<REPLACE_TIMESTAMP_COLUMN>\": timestamp_column,\n\
          \            \"<REPLACE_KNOWN_COVARIATES_NAMES>\": str(known_covariates_names\
          \ or []),\n        }\n        notebook = replace_placeholder_in_notebook(notebook,\
          \ replacements)\n\n        notebook_path = output_path / \"notebooks\"\n\
          \        notebook_path.mkdir(parents=True, exist_ok=True)\n        with\
          \ (notebook_path / \"automl_predictor_notebook.ipynb\").open(\"w\", encoding=\"\
          utf-8\") as f:\n            json.dump(notebook, f)\n\n        model_metadata\
          \ = {\n            \"name\": model_name_full,\n            \"location\"\
          : {\n                \"model_directory\": model_name_full,\n           \
          \     \"predictor\": str(Path(model_name_full) / \"predictor\"),\n     \
          \           \"notebook\": str(Path(model_name_full) / \"notebooks\" / \"\
          automl_predictor_notebook.ipynb\"),\n                \"metrics\": str(Path(model_name_full)\
          \ / \"metrics\"),\n            },\n            \"metrics\": {\n        \
          \        \"test_data\": metrics_dict,\n            },\n        }\n     \
          \   models_metadata.append(model_metadata)\n        with (output_path /\
          \ \"model.json\").open(\"w\", encoding=\"utf-8\") as f:\n            json.dump(model_metadata,\
          \ f, indent=2)\n\n    models_artifact.metadata[\"model_names\"] = json.dumps(model_names_full)\n\
          \    models_artifact.metadata[\"context\"] = {\n        \"data_config\"\
          : {\n            \"sampling_config\": sampling_config,\n            \"split_config\"\
          : split_config,\n        },\n        \"model_config\": model_config,\n \
          \       \"models\": models_metadata,\n    }\n\n    outputs = NamedTuple(\n\
          \        \"outputs\",\n        top_models=List[str],\n        predictor_path=str,\n\
          \        eval_metric=str,\n        model_config=dict,\n    )\n    return\
          \ outputs(\n        top_models=top_models,\n        predictor_path=str(predictor_path),\n\
          \        eval_metric=eval_metric,\n        model_config=model_config,\n\
          \    )\n\n"
        image: registry.redhat.io/rhoai/odh-automl-rhel9@sha256:77d5222d8b4f10828bfeafb692de7348e28c711b45ca3f70854e407bf651a6fd
        resources:
          cpuLimit: 32.0
          cpuRequest: 4.0
          memoryLimit: 68.719476736
          memoryRequest: 17.179869184
          resourceCpuLimit: '32'
          resourceCpuRequest: '4'
          resourceMemoryLimit: 64Gi
          resourceMemoryRequest: 16Gi
    exec-leaderboard-evaluation:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - leaderboard_evaluation
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
