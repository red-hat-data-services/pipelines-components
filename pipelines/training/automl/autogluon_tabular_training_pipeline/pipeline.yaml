# PIPELINE DEFINITION
# Name: autogluon-tabular-training-pipeline
# Description: End-to-end AutoGluon tabular training pipeline implementing a two-stage approach: first builds and selects top-performing models on sampled data, then refits them on the full dataset. The pipeline loads data from S3, splits it into train/test sets, trains multiple AutoGluon models using ensembling (stacking and bagging), selects the top N performers, refits each on the complete training data sequentially, and finally evaluates all refitted models to generate a comprehensive leaderboard with performance metrics.
# Inputs:
#    label_column: str
#    positive_class: str
#    task_type: str
#    top_n: int [Default: 3.0]
#    train_data_bucket_name: str
#    train_data_file_key: str
#    train_data_secret_name: str
components:
  comp-autogluon-models-training:
    executorLabel: exec-autogluon-models-training
    inputDefinitions:
      artifacts:
        test_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Dataset artifact (CSV) used for leaderboard ranking and evaluation.
      parameters:
        extra_train_data_path:
          defaultValue: ''
          description: Optional path to extra training CSV passed to ``refit_full``.
          isOptional: true
          parameterType: STRING
        label_column:
          description: Target/label column name in train and test datasets.
          parameterType: STRING
        pipeline_name:
          description: Pipeline run name; last dash-segment stripped for the notebook.
          parameterType: STRING
        positive_class:
          description: 'Optional label value for the positive class in **binary**
            classification

            (``int`` or ``str``, e.g. ``"1"`` or ``"yes"``). Passed to ``TabularPredictor``
            when set.

            If ``None`` or empty, AutoGluon infers the positive class when ``fit``
            runs (see note below).

            Ignored for ``multiclass`` and ``regression``.'
          isOptional: true
          parameterType: STRING
        run_id:
          description: Pipeline run ID written into the generated notebook.
          parameterType: STRING
        sample_row:
          description: JSON array of row dicts for the notebook example input; label
            column is stripped.
          parameterType: STRING
        sampling_config:
          description: Data sampling config stored in artifact metadata.
          isOptional: true
          parameterType: STRUCT
        split_config:
          description: Data split config stored in artifact metadata.
          isOptional: true
          parameterType: STRUCT
        task_type:
          description: 'ML task type: ``"binary"``, ``"multiclass"``, or ``"regression"``.'
          parameterType: STRING
        top_n:
          description: Number of top models to select and refit (1-10).
          parameterType: NUMBER_INTEGER
        train_data_path:
          description: Path to the selection-train CSV on the PVC workspace.
          parameterType: STRING
        workspace_path:
          description: PVC workspace directory; predictor saved at ``workspace_path/autogluon_predictor``.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        models_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        eval_metric:
          parameterType: STRING
  comp-automl-data-loader:
    executorLabel: exec-automl-data-loader
    inputDefinitions:
      parameters:
        bucket_name:
          description: S3 bucket name containing the file.
          parameterType: STRING
        file_key:
          description: S3 object key of the CSV file.
          parameterType: STRING
        label_column:
          description: Name of the label/target column in the dataset.
          parameterType: STRING
        sampling_method:
          description: '"first_n_rows", "stratified", or "random"; if None, derived
            from task_type.'
          isOptional: true
          parameterType: STRING
        selection_train_size:
          defaultValue: 0.3
          description: Fraction of the train portion used for model selection (default
            0.3).
          isOptional: true
          parameterType: NUMBER_DOUBLE
        split_config:
          description: 'Split configuration dictionary. Available keys: "test_size"
            (float), "random_state" (int), "stratify" (bool).'
          isOptional: true
          parameterType: STRUCT
        task_type:
          defaultValue: regression
          description: '"binary", "multiclass", or "regression" (default); used when
            sampling_method is None.'
          isOptional: true
          parameterType: STRING
        workspace_path:
          description: PVC workspace directory where train CSVs will be written.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        sampled_test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        extra_train_data_path:
          parameterType: STRING
        models_selection_train_data_path:
          parameterType: STRING
        sample_config:
          parameterType: STRUCT
        sample_row:
          parameterType: STRING
        split_config:
          parameterType: STRUCT
  comp-leaderboard-evaluation:
    executorLabel: exec-leaderboard-evaluation
    inputDefinitions:
      artifacts:
        models_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
          description: 'Combined Model artifact from ``autogluon_models_training``

            with ``metadata["model_names"]`` and per-model subdirectories.'
      parameters:
        eval_metric:
          description: 'Metric name for ranking (e.g. ``"accuracy"``, ``"root_mean_squared_error"``);

            leaderboard sorted descending (AutoGluon uses higher-is-better convention).'
          parameterType: STRING
    outputDefinitions:
      artifacts:
        html_artifact:
          artifactType:
            schemaTitle: system.HTML
            schemaVersion: 0.0.1
      parameters:
        best_model:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-autogluon-models-training:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - autogluon_models_training
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\n__KFP_EMBEDDED_ARCHIVE_B64 = ''\n\
          \nimport base64 as __kfp_b64\nimport io as __kfp_io\nimport os as __kfp_os\n\
          import sys as __kfp_sys\nimport tarfile as __kfp_tarfile\nimport tempfile\
          \ as __kfp_tempfile\n\n# Extract embedded archive at import time to ensure\
          \ sys.path and globals are set\n__kfp_tmpdir = __kfp_tempfile.TemporaryDirectory()\n\
          __KFP_EMBEDDED_ASSET_DIR = __kfp_tmpdir.name\ntry:\n    __kfp_bytes = __kfp_b64.b64decode(__KFP_EMBEDDED_ARCHIVE_B64.encode('ascii'))\n\
          \    with __kfp_tarfile.open(fileobj=__kfp_io.BytesIO(__kfp_bytes), mode='r:gz')\
          \ as __kfp_tar:\n        __kfp_tar.extractall(path=__KFP_EMBEDDED_ASSET_DIR)\n\
          except Exception as __kfp_e:\n    raise RuntimeError(f'Failed to extract\
          \ embedded archive: {__kfp_e}')\n\n# Always prepend the extracted directory\
          \ to sys.path for import resolution\nif __KFP_EMBEDDED_ASSET_DIR not in\
          \ __kfp_sys.path:\n    __kfp_sys.path.insert(0, __KFP_EMBEDDED_ASSET_DIR)\n\
          \n\n\n\ndef autogluon_models_training(\n    label_column: str,\n    task_type:\
          \ str,\n    top_n: int,\n    train_data_path: str,\n    test_data: dsl.Input[dsl.Dataset],\n\
          \    workspace_path: str,\n    pipeline_name: str,\n    run_id: str,\n \
          \   sample_row: str,\n    models_artifact: dsl.Output[dsl.Model],\n    notebooks:\
          \ dsl.EmbeddedInput[dsl.Dataset],\n    sampling_config: Optional[dict] =\
          \ None,\n    split_config: Optional[dict] = None,\n    extra_train_data_path:\
          \ str = \"\",\n    positive_class: Optional[str] = None,\n) -> NamedTuple(\"\
          outputs\", eval_metric=str):\n    \"\"\"Train AutoGluon models, select the\
          \ top N, and refit each on the full dataset.\n\n    Expects pre-cleaned\
          \ CSV data from the tabular data loader (infinite values replaced,\n   \
          \ duplicates removed, missing labels dropped). Reads train/test/extra-train\
          \ CSVs and\n    validates that the label column exists in each dataset.\n\
          \n    This component combines the model selection and full-refit stages\
          \ into a single\n    step. It trains a TabularPredictor on sampled data,\
          \ ranks all models on the test\n    set, then refits each of the top N models\
          \ on the full training data in a single\n    ``refit_full`` call. Post-refit\
          \ work (predict, evaluate, feature importance,\n    confusion matrix (via\
          \ evaluate_predictions detailed_report), classification curves,\n    notebook\
          \ generation) runs concurrently across all top-N models\n    via ``ThreadPoolExecutor``.\
          \ The deployment clone (``set_model_best`` +\n    ``clone_for_deployment``)\
          \ is serialized afterward because it mutates predictor\n    state. All artifacts\
          \ are written under a single output artifact so the pipeline\n    does not\
          \ require a ParallelFor loop. Each model directory contains a ``model.json``\n\
          \    file with model metadata (name, location, metrics).\n\n    Args:\n\
          \        label_column: Target/label column name in train and test datasets.\n\
          \        task_type: ML task type: ``\"binary\"``, ``\"multiclass\"``, or\
          \ ``\"regression\"``.\n        top_n: Number of top models to select and\
          \ refit (1-10).\n        train_data_path: Path to the selection-train CSV\
          \ on the PVC workspace.\n        test_data: Dataset artifact (CSV) used\
          \ for leaderboard ranking and evaluation.\n        workspace_path: PVC workspace\
          \ directory; predictor saved at ``workspace_path/autogluon_predictor``.\n\
          \        pipeline_name: Pipeline run name; last dash-segment stripped for\
          \ the notebook.\n        run_id: Pipeline run ID written into the generated\
          \ notebook.\n        sample_row: JSON array of row dicts for the notebook\
          \ example input; label column is stripped.\n        models_artifact: Output\
          \ Model artifact containing all refitted model subdirectories.\n       \
          \ notebooks: Embedded notebook templates injected by the KFP runtime.\n\
          \        sampling_config: Data sampling config stored in artifact metadata.\n\
          \        split_config: Data split config stored in artifact metadata.\n\
          \        extra_train_data_path: Optional path to extra training CSV passed\
          \ to ``refit_full``.\n        positive_class: Optional label value for the\
          \ positive class in **binary** classification\n            (``int`` or ``str``,\
          \ e.g. ``\"1\"`` or ``\"yes\"``). Passed to ``TabularPredictor`` when set.\n\
          \            If ``None`` or empty, AutoGluon infers the positive class when\
          \ ``fit`` runs (see note below).\n            Ignored for ``multiclass``\
          \ and ``regression``.\n\n    Returns:\n        NamedTuple with ``eval_metric``\
          \ (the metric used for ranking, e.g. ``\"r2\"`` or ``\"accuracy\"``).\n\n\
          \    Raises:\n        TypeError: If any required string parameter is empty\
          \ or configs have wrong types.\n        ValueError: If ``task_type`` is\
          \ invalid, ``top_n`` is out of range, ``sample_row``\n            is not\
          \ a JSON list, ``problem_type`` is unsupported for notebook generation,\n\
          \            label column not found in CSV, or train/test data is empty.\n\
          \        FileNotFoundError: If train/test data or predictor paths cannot\
          \ be found.\n    \"\"\"  # noqa: E501\n    import json\n    import logging\n\
          \    import math\n    import shutil\n    from concurrent.futures import\
          \ ThreadPoolExecutor\n    from pathlib import Path\n    from typing import\
          \ Any\n\n    import numpy as np\n    import pandas as pd\n    from autogluon.tabular\
          \ import TabularPredictor\n\n    VALID_TASK_TYPES = {\"binary\", \"multiclass\"\
          , \"regression\"}\n    TOP_N_MAX = 10\n\n    # Input parameters validation\n\
          \    if not isinstance(label_column, str) or not label_column.strip():\n\
          \        raise TypeError(\"label_column must be a non-empty string.\")\n\
          \    if task_type not in VALID_TASK_TYPES:\n        raise ValueError(f\"\
          task_type must be one of {VALID_TASK_TYPES}; got {task_type!r}.\")\n   \
          \ if not train_data_path or not isinstance(train_data_path, str) or not\
          \ train_data_path.strip():\n        raise TypeError(\"train_data_path must\
          \ be a non-empty string.\")\n    if not workspace_path or not isinstance(workspace_path,\
          \ str) or not workspace_path.strip():\n        raise TypeError(\"workspace_path\
          \ must be a non-empty string.\")\n    if top_n <= 0 or top_n > TOP_N_MAX:\n\
          \        raise ValueError(f\"top_n must be an integer in the range (0, {TOP_N_MAX}];\
          \ got {top_n}.\")\n    for param, value in (\n        (\"pipeline_name\"\
          , pipeline_name),\n        (\"run_id\", run_id),\n        (\"sample_row\"\
          , sample_row),\n    ):\n        if not isinstance(value, str) or not value.strip():\n\
          \            raise TypeError(f\"{param} must be a non-empty string.\")\n\
          \    if sampling_config is not None and not isinstance(sampling_config,\
          \ dict):\n        raise TypeError(\"sampling_config must be a dictionary\
          \ or None.\")\n    if split_config is not None and not isinstance(split_config,\
          \ dict):\n        raise TypeError(\"split_config must be a dictionary or\
          \ None.\")\n    if positive_class is not None and not isinstance(positive_class,\
          \ str):\n        raise TypeError(\"positive_class must be a string or None.\"\
          )\n\n    sampling_config = sampling_config or {}\n    split_config = split_config\
          \ or {}\n\n    def _coerce_positive_class(value: Optional[str]) -> str |\
          \ int | None:\n        \"\"\"Normalize pipeline input; empty string means\
          \ unset (AutoGluon will infer).\"\"\"\n        if value is None:\n     \
          \       return None\n        stripped = value.strip()\n        if not stripped:\n\
          \            return None\n        if stripped.lstrip(\"-\").isdigit():\n\
          \            return int(stripped)\n        return stripped\n\n    try:\n\
          \        sample_row_list = json.loads(sample_row)\n    except json.JSONDecodeError\
          \ as e:\n        raise TypeError(f\"sample_row must be valid JSON array:\
          \ {e}\") from e\n    if not isinstance(sample_row_list, list):\n       \
          \ raise ValueError(\"sample_row must be a JSON array list of row objects.\"\
          )\n\n    logger = logging.getLogger(__name__)\n\n    DEFAULT_PRESET = \"\
          medium_quality\"\n    DEFAULT_TIME_LIMIT = 30 * 60  # 30 minutes\n\n   \
          \ # 1. models selection stage\n\n    train_data_df = pd.read_csv(train_data_path)\n\
          \    if label_column not in train_data_df.columns:\n        raise ValueError(\n\
          \            f\"Label column {label_column!r} not found in train CSV. Available\
          \ columns: {list(train_data_df.columns)}\"\n        )\n    if train_data_df.empty:\n\
          \        raise ValueError(\"Training CSV is empty. Ensure the data loader\
          \ produced valid training data.\")\n\n    test_data_df = pd.read_csv(test_data.path)\n\
          \    if label_column not in test_data_df.columns:\n        raise ValueError(\n\
          \            f\"Label column {label_column!r} not found in test CSV. Available\
          \ columns: {list(test_data_df.columns)}\"\n        )\n    if test_data_df.empty:\n\
          \        raise ValueError(\"Test CSV is empty. Ensure the data loader produced\
          \ valid test data.\")\n\n    extra_train_df = None\n    if extra_train_data_path.strip():\n\
          \        extra_train_df = pd.read_csv(extra_train_data_path)\n        if\
          \ label_column not in extra_train_df.columns:\n            raise ValueError(\n\
          \                f\"Label column {label_column!r} not found in extra-train\
          \ CSV. \"\n                f\"Available columns: {list(extra_train_df.columns)}\"\
          \n            )\n        if extra_train_df.empty:\n            logger.warning(\"\
          Extra train CSV is empty; passing train_data_extra=None to refit_full.\"\
          )\n            extra_train_df = None\n\n    eval_metric = \"r2\" if task_type\
          \ == \"regression\" else \"accuracy\"\n\n    coerced_positive_class = _coerce_positive_class(positive_class)\n\
          \    if coerced_positive_class is not None and task_type != \"binary\":\n\
          \        logger.warning(\n            \"positive_class=%r is ignored when\
          \ task_type=%r (only used for binary classification).\",\n            coerced_positive_class,\n\
          \            task_type,\n        )\n\n    predictor_path = Path(workspace_path)\
          \ / \"autogluon_predictor\"\n    predictor_init_kwargs: dict[str, Any] =\
          \ {\n        \"problem_type\": task_type,\n        \"label\": label_column,\n\
          \        \"eval_metric\": eval_metric,\n        \"path\": predictor_path,\n\
          \        \"verbosity\": 2,\n    }\n    if task_type == \"binary\" and coerced_positive_class\
          \ is not None:\n        predictor_init_kwargs[\"positive_class\"] = coerced_positive_class\n\
          \        logger.info(\"Using explicit positive_class=%r for TabularPredictor.\"\
          , coerced_positive_class)\n    elif task_type == \"binary\":\n        logger.info(\n\
          \            \"positive_class not set; AutoGluon will infer it when fit\
          \ runs as the second unique \"\n            \"label value after sorting\
          \ classes (e.g. classes [0, 1] -> positive_class=1; \"\n            \"classes\
          \ ['abc', 'def'] -> positive_class='def').\"\n        )\n\n    predictor\
          \ = TabularPredictor(**predictor_init_kwargs).fit(\n        train_data=train_data_df,\n\
          \        num_stack_levels=1,\n        num_bag_folds=4,\n        use_bag_holdout=True,\n\
          \        holdout_frac=0.2,\n        time_limit=DEFAULT_TIME_LIMIT,\n   \
          \     presets=DEFAULT_PRESET,\n    )\n\n    # Select top N models\n    leaderboard\
          \ = predictor.leaderboard(test_data_df)\n    logger.info(\"Leaderboard:\\\
          n\\n %s\", leaderboard.head(top_n).to_string())\n    top_models = leaderboard.head(top_n)[\"\
          model\"].values.tolist()\n\n    model_config = {\n        \"preset\": DEFAULT_PRESET,\n\
          \        \"eval_metric\": eval_metric,\n        \"time_limit\": DEFAULT_TIME_LIMIT,\n\
          \    }\n\n    def retrieve_pipeline_name(name: str) -> str:\n        \"\"\
          \"Strip the last dash-separated segment (run id / suffix) from a pipeline\
          \ name.\"\"\"\n        if not name:\n            return name\n        name\
          \ = name.rstrip(\"-\")\n        if \"-\" not in name:\n            return\
          \ name\n        tokens = name.split(\"-\")\n        return \"-\".join(tokens[:-1])\
          \ if len(tokens) > 1 else tokens[0]\n\n    pipeline_name_trimmed = retrieve_pipeline_name(pipeline_name)\n\
          \n    # Strip label column from sample row -- same for all models\n    sample_row_formatted\
          \ = [\n        {col: value for col, value in row.items() if col != predictor.label}\
          \ for row in sample_row_list\n    ]\n\n    problem_type = predictor.problem_type\n\
          \    match problem_type:\n        case \"regression\":\n            notebook_file\
          \ = \"regression_notebook.ipynb\"\n        case \"binary\" | \"multiclass\"\
          :\n            notebook_file = \"classification_notebook.ipynb\"\n     \
          \   case _:\n            raise ValueError(f\"Invalid problem type: {problem_type}\"\
          )\n\n    model_names_full = [m + \"_FULL\" for m in top_models]\n\n    #\
          \ 2. models refit stage\n\n    # Clone once to PVC (same filesystem as predictor_path)\
          \ to avoid S3 FUSE file-dropping\n    # during shutil.copytree inside predictor.clone().\n\
          \    work_path = predictor_path.parent / \"refit_work\"\n    predictor_clone\
          \ = predictor.clone(path=work_path, return_clone=True, dirs_exist_ok=True)\n\
          \n    # Refit all top models in a single call:  AutoGluon resolves stacking\
          \ dependencies internally.\n    predictor_clone.refit_full(model=top_models,\
          \ train_data_extra=extra_train_df)\n\n    def replace_placeholder_in_notebook(notebook,\
          \ replacements):\n        for cell in notebook.get(\"cells\", []):\n   \
          \         if cell.get(\"cell_type\") != \"code\":\n                continue\n\
          \            new_source = []\n            for line in cell.get(\"source\"\
          , []):\n                for placeholder, value in replacements.items():\n\
          \                    line = line.replace(placeholder, value)\n         \
          \       new_source.append(line)\n            cell[\"source\"] = new_source\n\
          \        return notebook\n\n    def _scalar_eval_metrics(eval_results: dict)\
          \ -> dict:\n        \"\"\"Keep only finite scalar scores for metrics.json\
          \ (KFP-safe).\"\"\"\n        metrics = {}\n        for key, value in eval_results.items():\n\
          \            if isinstance(value, float) and (math.isnan(value) or math.isinf(value)):\n\
          \                continue\n            if hasattr(value, \"item\"):\n  \
          \              value = float(value)\n                if math.isnan(value)\
          \ or math.isinf(value):\n                    continue\n            if isinstance(value,\
          \ (int, float)):\n                metrics[key] = value\n        return metrics\n\
          \n    def _confusion_matrix_to_dict(confusion_matrix_res) -> dict | None:\n\
          \        if confusion_matrix_res is None:\n            return None\n   \
          \     if hasattr(confusion_matrix_res, \"to_dict\"):\n            return\
          \ confusion_matrix_res.to_dict()\n        if isinstance(confusion_matrix_res,\
          \ dict):\n            return confusion_matrix_res\n        raise TypeError(f\"\
          Unexpected confusion_matrix type: {type(confusion_matrix_res)!r}\")\n\n\
          \    def _serialize_curve_array(values: Any) -> list[float]:\n        return\
          \ [float(v) for v in np.asarray(values).tolist()]\n\n    def _serialize_curve_thresholds(values:\
          \ Any) -> list[float | str]:\n        serialized: list[float | str] = []\n\
          \        for value in np.asarray(values).tolist():\n            if isinstance(value,\
          \ (float, np.floating)) and np.isposinf(value):\n                serialized.append(\"\
          inf\")\n            elif isinstance(value, (float, np.floating)) and np.isneginf(value):\n\
          \                serialized.append(\"-inf\")\n            else:\n      \
          \          serialized.append(float(value))\n        return serialized\n\n\
          \    def _binarize_labels(y_true, positive_label: Any) -> np.ndarray:\n\
          \        import pandas as pd\n\n        labels = y_true if isinstance(y_true,\
          \ pd.Series) else pd.Series(y_true)\n        return (labels == positive_label).astype(int).to_numpy()\n\
          \n    def _resolve_positive_column(classes: list[Any], positive_class: Any\
          \ | None) -> Any:\n        if positive_class is not None and positive_class\
          \ in classes:\n            return positive_class\n        if len(classes)\
          \ == 2:\n            logger.warning(\n                \"positive_class not\
          \ specified for binary classification; defaulting to %r as positive class\
          \ \"\n                \"(available classes: %r). Set positive_class explicitly\
          \ for clarity.\",\n                classes[1],\n                classes,\n\
          \            )\n            return classes[1]\n        raise ValueError(\n\
          \            f\"Cannot resolve positive class from proba columns {classes!r};\
          \ \"\n            f\"pass positive_class explicitly (got {positive_class!r}).\"\
          \n        )\n\n    def _roc_curve_block(y_true_binary: np.ndarray, y_score:\
          \ np.ndarray) -> dict[str, Any]:\n        import math\n\n        from sklearn.metrics\
          \ import roc_auc_score, roc_curve\n\n        fpr, tpr, thresholds = roc_curve(y_true_binary,\
          \ y_score)\n        auc = float(roc_auc_score(y_true_binary, y_score))\n\
          \n        if math.isnan(auc):\n            raise ValueError(\n         \
          \       \"Cannot compute ROC AUC: only one class present in test data. \"\
          \n                \"ROC curves require both positive and negative examples.\"\
          \n            )\n\n        return {\n            \"auc\": auc,\n       \
          \     \"fpr\": _serialize_curve_array(fpr),\n            \"tpr\": _serialize_curve_array(tpr),\n\
          \            \"thresholds\": _serialize_curve_thresholds(thresholds),\n\
          \        }\n\n    def _pr_curve_block(y_true_binary: np.ndarray, y_score:\
          \ np.ndarray, baseline_precision: float) -> dict[str, Any]:\n        import\
          \ math\n\n        from sklearn.metrics import average_precision_score, precision_recall_curve\n\
