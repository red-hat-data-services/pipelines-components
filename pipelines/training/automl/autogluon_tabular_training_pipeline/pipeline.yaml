---
# PIPELINE DEFINITION
# Name: autogluon-tabular-training-pipeline
# Description: End-to-end AutoGluon tabular training pipeline implementing a two-stage approach: first builds and selects top-performing models on sampled data, then refits them on the full dataset. The pipeline loads data from S3, splits it into train/test sets, trains multiple AutoGluon models using ensembling (stacking and bagging), selects the top N performers, refits each on the complete training data in parallel, and finally evaluates all refitted models to generate a comprehensive leaderboard with performance metrics.
# Inputs:
#    label_column: str
#    task_type: str
#    top_n: int [Default: 3.0]
#    train_data_bucket_name: str
#    train_data_file_key: str
#    train_data_secret_name: str
components:
  comp-autogluon-models-full-refit:
    executorLabel: exec-autogluon-models-full-refit
    inputDefinitions:
      artifacts:
        test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Dataset artifact (CSV) for evaluation and metrics; format should
            match initial training data.
      parameters:
        extra_train_data_path:
          defaultValue: ''
          description: Optional path to extra training data CSV (on PVC workspace)
            passed to refit_full.
          isOptional: true
          parameterType: STRING
        model_config:
          description: Model training config (stored in artifact metadata).
          isOptional: true
          parameterType: STRUCT
        model_name:
          description: Name of the model to refit (must exist in predictor); refitted
            model saved with "_FULL" suffix.
          parameterType: STRING
        pipeline_name:
          description: Pipeline run name; last hyphen-separated segment used in the
            generated notebook.
          parameterType: STRING
        predictor_path:
          description: Path to the trained TabularPredictor containing model_name.
          parameterType: STRING
        run_id:
          description: Pipeline run ID (used in the generated notebook).
          parameterType: STRING
        sample_row:
          description: JSON list of row objects for example input in the notebook;
            label column is stripped.
          parameterType: STRING
        sampling_config:
          description: Data sampling config (stored in artifact metadata).
          isOptional: true
          parameterType: STRUCT
        split_config:
          description: Data split config (stored in artifact metadata).
          isOptional: true
          parameterType: STRUCT
    outputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        model_name:
          parameterType: STRING
  comp-automl-data-loader:
    executorLabel: exec-automl-data-loader
    inputDefinitions:
      parameters:
        bucket_name:
          description: S3 bucket name containing the file.
          parameterType: STRING
        file_key:
          description: S3 object key of the CSV file.
          parameterType: STRING
        label_column:
          description: Name of the label/target column in the dataset.
          parameterType: STRING
        sampling_method:
          description: '"first_n_rows", "stratified", or "random"; if None, derived
            from task_type.'
          isOptional: true
          parameterType: STRING
        selection_train_size:
          defaultValue: 0.3
          description: Fraction of the train portion used for model selection (default
            0.3).
          isOptional: true
          parameterType: NUMBER_DOUBLE
        split_config:
          description: 'Split configuration dictionary. Available keys: "test_size"
            (float), "random_state" (int), "stratify" (bool).'
          isOptional: true
          parameterType: STRUCT
        task_type:
          defaultValue: regression
          description: '"binary", "multiclass", or "regression" (default); used when
            sampling_method is None.'
          isOptional: true
          parameterType: STRING
        workspace_path:
          description: PVC workspace directory where train CSVs will be written.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        sampled_test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        extra_train_data_path:
          parameterType: STRING
        models_selection_train_data_path:
          parameterType: STRING
        sample_config:
          parameterType: STRUCT
        sample_row:
          parameterType: STRING
        split_config:
          parameterType: STRUCT
  comp-for-loop-1:
    dag:
      outputs:
        artifacts:
          pipelinechannel--autogluon-models-full-refit-model_artifact:
            artifactSelectors:
              - outputArtifactKey: model_artifact
                producerSubtask: autogluon-models-full-refit
      tasks:
        autogluon-models-full-refit:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-autogluon-models-full-refit
          inputs:
            artifacts:
              test_dataset:
                componentInputArtifact: pipelinechannel--automl-data-loader-sampled_test_dataset
            parameters:
              extra_train_data_path:
                componentInputParameter: pipelinechannel--automl-data-loader-extra_train_data_path
              model_config:
                componentInputParameter: pipelinechannel--models-selection-model_config
              model_name:
                componentInputParameter: pipelinechannel--models-selection-top_models-loop-item
              pipeline_name:
                runtimeValue:
                  constant: '{{$.pipeline_job_resource_name}}'
              predictor_path:
                componentInputParameter: pipelinechannel--models-selection-predictor_path
              run_id:
                runtimeValue:
                  constant: '{{$.pipeline_job_uuid}}'
              sample_row:
                componentInputParameter: pipelinechannel--automl-data-loader-sample_row
              sampling_config:
                componentInputParameter: pipelinechannel--automl-data-loader-sample_config
              split_config:
                componentInputParameter: pipelinechannel--automl-data-loader-split_config
          taskInfo:
            name: autogluon-models-full-refit
    inputDefinitions:
      artifacts:
        pipelinechannel--automl-data-loader-sampled_test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--automl-data-loader-extra_train_data_path:
          parameterType: STRING
        pipelinechannel--automl-data-loader-sample_config:
          parameterType: STRUCT
        pipelinechannel--automl-data-loader-sample_row:
          parameterType: STRING
        pipelinechannel--automl-data-loader-split_config:
          parameterType: STRUCT
        pipelinechannel--models-selection-model_config:
          parameterType: STRUCT
        pipelinechannel--models-selection-predictor_path:
          parameterType: STRING
        pipelinechannel--models-selection-top_models:
          parameterType: LIST
        pipelinechannel--models-selection-top_models-loop-item:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        pipelinechannel--autogluon-models-full-refit-model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
          isArtifactList: true
  comp-leaderboard-evaluation:
    executorLabel: exec-leaderboard-evaluation
    inputDefinitions:
      artifacts:
        models:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
          description: List of Model artifacts with "display_name" in metadata and
            metrics at model.path/model_name/metrics/metrics.json.
          isArtifactList: true
      parameters:
        eval_metric:
          description: Metric name for ranking (e.g. "accuracy", "root_mean_squared_error");
            leaderboard sorted by it descending.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        html_artifact:
          artifactType:
            schemaTitle: system.HTML
            schemaVersion: 0.0.1
      parameters:
        best_model:
          parameterType: STRING
  comp-models-selection:
    executorLabel: exec-models-selection
    inputDefinitions:
      artifacts:
        test_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Dataset artifact (CSV) for evaluation and leaderboard; schema
            must match train_data.
      parameters:
        label_column:
          description: Name of the target/label column in train and test datasets.
          parameterType: STRING
        task_type:
          description: 'ML task type: "binary", "multiclass", or "regression"; drives
            metrics and model types.'
          parameterType: STRING
        top_n:
          description: Number of top-performing models to select from the leaderboard
            (positive integer).
          parameterType: NUMBER_INTEGER
        train_data_path:
          description: Path to the training data CSV (on PVC workspace); must include
            label_column and features.
          parameterType: STRING
        workspace_path:
          description: Workspace directory where TabularPredictor is saved (workspace_path/autogluon_predictor).
          parameterType: STRING
    outputDefinitions:
      parameters:
        eval_metric:
          parameterType: STRING
        model_config:
          parameterType: STRUCT
        predictor_path:
          parameterType: STRING
        top_models:
          parameterType: LIST
deploymentSpec:
  executors:
    exec-autogluon-models-full-refit:
      container:
        args:
          - --executor_input
          - '{{$}}'
          - --function_to_execute
          - autogluon_models_full_refit
        command:
          - sh
          - -c
          - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'autogluon.tabular==1.5.0'\
          \ 'catboost==1.2.8' 'fastai==2.8.5' 'lightgbm==4.6.0' 'torch==2.9.1' 'xgboost==3.1.3'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
          - sh
          - -ec
          - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
          - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef autogluon_models_full_refit(\n    model_name: str,\n    test_dataset:\
          \ dsl.Input[dsl.Dataset],\n    predictor_path: str,\n    pipeline_name:\
          \ str,\n    run_id: str,\n    sample_row: str,\n    model_artifact: dsl.Output[dsl.Model],\n\
          \    sampling_config: Optional[dict] = None,\n    split_config: Optional[dict]\
          \ = None,\n    model_config: Optional[dict] = None,\n    extra_train_data_path:\
          \ str = \"\",\n) -> NamedTuple(\"outputs\", model_name=str):\n    \"\"\"\
          Refit a specific AutoGluon model on the full training dataset.\n\n    This\
          \ component takes a trained AutoGluon TabularPredictor, loaded from\n  \
          \  predictor_path, and refits a specific model, identified by model_name,\
          \ on\n    the full training data. When extra_train_data_path is provided,\
          \ the extra\n    training data is loaded and passed to refit_full as train_data_extra.\
          \ The\n    test_dataset is used for evaluation and for writing metrics.\
          \ The refitted\n    model is saved with the suffix \"_FULL\" appended to\
          \ model_name.\n\n    Artifacts are written under model_artifact.path in\
          \ a directory named\n    <model_name>_FULL (e.g. LightGBM_BAG_L1_FULL).\
          \ The layout is:\n\n      - model_artifact.path / <model_name>_FULL / predictor\
          \ /\n      TabularPredictor (predictor.pkl inside); clone with only the\
          \ refitted model.\n\n      - model_artifact.path / <model_name>_FULL / metrics\
          \ / metrics.json\n      (evaluation results; leaderboard component reads\
          \ this via display_name/metrics/metrics.json).\n\n      - model_artifact.path\
          \ / <model_name>_FULL / metrics / feature_importance.json\n\n      - model_artifact.path\
          \ / <model_name>_FULL / metrics / confusion_matrix.json\n      (classification\
          \ only).\n\n      - model_artifact.path / <model_name>_FULL / notebooks\
          \ / automl_predictor_notebook.ipynb\n\n    Artifact metadata: display_name\
          \ (<model_name>_FULL), context (data_config,\n    task_type, label_column,\
          \ model_config, location, metrics), and\n    context.location.notebook (path\
          \ to the notebook). Supported problem types:\n    regression, binary, multiclass;\
          \ any other raises ValueError.\n\n    This component is typically used in\
          \ a two-stage training pipeline where\n    models are first trained on sampled\
          \ data for exploration, then the best\n    candidates are refitted on the\
          \ full dataset for optimal performance.\n\n    Args:\n        model_name:\
          \ Name of the model to refit (must exist in predictor); refitted model saved\
          \ with \"_FULL\" suffix.\n        test_dataset: Dataset artifact (CSV) for\
          \ evaluation and metrics; format should match initial training data.\n \
          \       predictor_path: Path to the trained TabularPredictor containing\
          \ model_name.\n        sampling_config: Data sampling config (stored in\
          \ artifact metadata).\n        split_config: Data split config (stored in\
          \ artifact metadata).\n        model_config: Model training config (stored\
          \ in artifact metadata).\n        pipeline_name: Pipeline run name; last\
          \ hyphen-separated segment used in the generated notebook.\n        run_id:\
          \ Pipeline run ID (used in the generated notebook).\n        sample_row:\
          \ JSON list of row objects for example input in the notebook; label column\
          \ is stripped.\n        model_artifact: Output Model; artifacts under model_artifact.path/<model_name>_FULL\
          \ (predictor/, metrics/, notebooks/).\n        extra_train_data_path: Optional\
          \ path to extra training data CSV (on PVC workspace) passed to refit_full.\n\
          \n    Returns:\n        NamedTuple with model_name (refitted name with \"\
          _FULL\" suffix); artifacts written to model_artifact.\n\n    Raises:\n \
          \       FileNotFoundError: If predictor path or test_dataset path cannot\
          \ be found.\n        ValueError: If predictor load fails, model_name not\
          \ in predictor, refit fails, or invalid problem_type.\n        KeyError:\
          \ If required model files are missing from the predictor.\n\n    Example:\n\
          \        from kfp import dsl\n        from components.training.automl.autogluon_models_full_refit\
          \ import (\n            autogluon_models_full_refit,\n        )\n\n    \
          \    @dsl.pipeline(name=\"model-refit-pipeline\")\n        def refit_pipeline(test_data,\
          \ predictor_path, pipeline_name, run_id):\n            refitted = autogluon_models_full_refit(\n\
          \                model_name=\"LightGBM_BAG_L1\",\n                test_dataset=test_data,\n\
          \                predictor_path=predictor_path,\n                sampling_config={},\n\
          \                split_config={},\n                model_config={},\n  \
          \              pipeline_name=pipeline_name,\n                run_id=run_id,\n\
          \                sample_row='[{\"feature1\": 1, \"target\": 1.0}]',\n  \
          \              model_artifact=dsl.Output(type=\"Model\"),\n            )\n\
          \            return refitted.model_name\n\n    \"\"\"  # noqa: E501\n  \
          \  import json\n    import os\n    from pathlib import Path\n\n    import\
          \ pandas as pd\n    from autogluon.tabular import TabularPredictor\n\n \
          \   sampling_config = sampling_config or {}\n    split_config = split_config\
          \ or {}\n    model_config = model_config or {}\n\n    test_dataset_df =\
          \ pd.read_csv(test_dataset.path)\n    extra_train_df = pd.read_csv(extra_train_data_path)\
          \ if extra_train_data_path else None\n\n    predictor = TabularPredictor.load(predictor_path)\n\
          \n    # save refitted model to output artifact\n    model_name_full = model_name\
          \ + \"_FULL\"\n    output_path = Path(model_artifact.path) / model_name_full\n\
          \n    # set the name of the model artifact and its metadata\n    model_artifact.metadata[\"\
          display_name\"] = model_name_full\n    model_artifact.metadata[\"context\"\
          ] = {}\n    model_artifact.metadata[\"context\"][\"data_config\"] = {\n\
          \        \"sampling_config\": sampling_config,\n        \"split_config\"\
          : split_config,\n    }\n\n    model_artifact.metadata[\"context\"][\"task_type\"\
          ] = predictor.problem_type\n    model_artifact.metadata[\"context\"][\"\
          label_column\"] = predictor.label\n\n    model_artifact.metadata[\"context\"\
          ][\"model_config\"] = model_config\n    model_artifact.metadata[\"context\"\
          ][\"location\"] = {\n        \"model_directory\": f\"{model_name_full}\"\
          ,\n        \"predictor\": f\"{model_name_full}/predictor/predictor.pkl\"\
          ,\n    }\n\n    # clone the predictor to the output artifact path and delete\
          \ unnecessary models\n    predictor_clone = predictor.clone(path=output_path\
          \ / \"predictor\", return_clone=True, dirs_exist_ok=True)\n    predictor_clone.delete_models(models_to_keep=[model_name])\n\
          \n    # refit on training + validation data, optionally with extra training\
          \ data\n    predictor_clone.refit_full(model=model_name, train_data_extra=extra_train_df)\n\
          \n    predictor_clone.set_model_best(model=model_name_full, save_trainer=True)\n\
          \    predictor_clone.save_space()\n\n    eval_results = predictor_clone.evaluate(test_dataset_df)\n\
          \    model_artifact.metadata[\"context\"][\"metrics\"] = {\"test_data\"\
          : eval_results}\n    feature_importance = predictor_clone.feature_importance(test_dataset_df)\n\
          \n    # save evaluation results to output artifact\n    os.makedirs(str(output_path\
          \ / \"metrics\"), exist_ok=True)\n    with (output_path / \"metrics\" /\
          \ \"metrics.json\").open(\"w\") as f:\n        json.dump(eval_results, f)\n\
          \n    # save feature importance to output artifact\n    with (output_path\
          \ / \"metrics\" / \"feature_importance.json\").open(\"w\") as f:\n     \
          \   json.dump(feature_importance.to_dict(), f)\n\n    # generate confusion\
          \ matrix for classification problem types\n    if predictor.problem_type\
          \ in {\"binary\", \"multiclass\"}:\n        from autogluon.core.metrics\
          \ import confusion_matrix\n\n        confusion_matrix_res = confusion_matrix(\n\
          \            solution=test_dataset_df[predictor.label],\n            prediction=predictor_clone.predict(test_dataset_df),\n\
          \            output_format=\"pandas_dataframe\",\n        )\n        with\
          \ (output_path / \"metrics\" / \"confusion_matrix.json\").open(\"w\") as\
          \ f:\n            json.dump(confusion_matrix_res.to_dict(), f)\n\n    #\
          \ Notebook generation\n\n    # TODO: Move to build package in next stages\n\
          \    # NOTE: The generated notebook expects that a connection secret is\
          \ available in the environment where it is run.\n    # This connection should\
          \ provide the same environment variables as required by the pipeline input\
          \ secret,\n    # i.e. AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_S3_ENDPOINT,\
          \ and AWS_DEFAULT_REGION,\n    # plus the variable AWS_S3_BUCKET for S3\
          \ bucket access.\n\n    REGRESSION = {\n        \"cells\": [\n         \
          \   {\n                \"cell_type\": \"markdown\",\n                \"\
          id\": \"a12d957a-c313-4e92-9578-44f6a48560d5\",\n                \"metadata\"\
          : {},\n                \"source\": [\n                    \"![AutoML Banner](data:image/svg+xml;base64,)\"\
          \  # noqa: E501\n                ],\n            },\n            {\n   \
          \             \"cell_type\": \"markdown\",\n                \"id\": \"0e9aa72f\"\
          ,\n                \"metadata\": {},\n                \"source\": [\n  \
          \                  \"## Notebook content\\n\",\n                    \"\\\
          n\",\n                    \"This notebook lets you review the experiment\
          \ leaderboard for insights into trained model evaluation quality, load a\
          \ chosen AutoGluon model from S3, and run predictions. \\n\",  # noqa: E501\n\
          \                    \"\\n\",\n                    \"\\n\",\n          \
          \          \" \\U0001f4a1 **Tips:**\\n\",\n                    \"- Ensure\
          \ the S3 connection to pipeline run results is configured so the notebook\
          \ can access run artifacts.\\n\",  # noqa: E501\n                    \"\
          - The model name must match one of the models listed in the leaderboard\
          \ (the **model** column).\\n\",\n                    \"\\n\",\n        \
          \            \"### Contents\\n\",\n                    \"This notebook contains\
          \ the following parts:\\n\",\n                    \"\\n\",\n           \
          \         \"**[Setup](#setup)**  \\n\",\n                    \"**[Experiment\
          \ run details](#experiment-run-details)**  \\n\",\n                    \"\
          **[Download trained model](#download-trained-model)**  \\n\",\n        \
          \            \"**[Model insights](#model-insights)**  \\n\",\n         \
          \           \"**[Load the predictor](#load-the-predictor)**  \\n\",\n  \
          \                  \"**[Predict the values](#predict-the-values)**  \\n\"\
          ,\n                    \"**[Summary and next steps](#summary-and-next-steps)**\"\
          ,\n                ],\n            },\n            {\n                \"\
          cell_type\": \"markdown\",\n                \"id\": \"a7d9cf2b-18cc-4ac9-87af-a74f8bf60322\"\
          ,\n                \"metadata\": {},\n                \"source\": ['<a id=\"\
          setup\"></a>\\n', \"## Setup\"],\n            },\n            {\n      \
          \          \"cell_type\": \"code\",\n                \"execution_count\"\
          : None,\n                \"id\": \"5bacd972\",\n                \"metadata\"\
          : {},\n                \"outputs\": [],\n                \"source\": [\"\
          import warnings\\n\", \"\\n\", 'warnings.filterwarnings(\"ignore\")'],\n\
          \            },\n            {\n                \"cell_type\": \"code\"\
          ,\n                \"execution_count\": None,\n                \"id\": \"\
          cec84205-8ee9-4aaf-a97e-4ef576e7b9da\",\n                \"metadata\": {},\n\
          \                \"outputs\": [],\n                \"source\": [\n     \
          \               \"%pip install autogluon.tabular==1.5.0 | tail -n 1\\n\"\
          ,\n                    \"%pip install catboost==1.2.8 | tail -n 1\\n\",\n\
          \                    \"%pip install fastai==2.8.5 | tail -n 1\\n\",\n  \
          \                  \"%pip install lightgbm==4.6.0 | tail -n 1\\n\",\n  \
          \                  \"%pip install torch==2.9.1 | tail -n 1\\n\",\n     \
          \               \"%pip install xgboost==3.1.3 | tail -n 1\\n\",\n      \
          \          ],\n            },\n            {\n                \"cell_type\"\
          : \"markdown\",\n                \"id\": \"e8ff506e-f1a3-4990-a979-7790a5105251\"\
          ,\n                \"metadata\": {},\n                \"source\": [\n  \
          \                  '<a id=\"experiment-run-details\"></a>\\n',\n       \
          \             \"## Experiment run details\\n\",\n                    \"\\\
          n\",\n                    \"Set the pipeline name and run ID that identify\
          \ the training run whose artifacts you want to load. These values are typically\
          \ available from the pipeline run or workbench.\",  # noqa: E501\n     \
          \           ],\n            },\n            {\n                \"cell_type\"\
          : \"code\",\n                \"execution_count\": None,\n              \
          \  \"id\": \"fa7f736d-0b5c-4988-87a5-4d1a5cde0873\",\n                \"\
          metadata\": {},\n                \"outputs\": [],\n                \"source\"\
          : [\n                    'pipeline_name = \"<REPLACE_PIPELINE_NAME>\"\\\
          n',\n                    'run_id = \"<REPLACE_RUN_ID>\"\\n',\n         \
          \           'model_name = \"<REPLACE_MODEL_NAME>\"',\n                ],\n\
          \            },\n            {\n                \"cell_type\": \"markdown\"\
          ,\n                \"id\": \"54525a94-7799-41cc-822e-91bae88b3b78\",\n \
          \               \"metadata\": {},\n                \"source\": [\n     \
          \               '<a id=\"download-trained-model\"></a>\\n',\n          \
          \          \"## Download trained model\\n\",\n                    \"\\n\"\
          ,\n                    \" \\U0001f4cc **Action:** Ensure the S3 connection\
          \ is added to the workbench so the notebook can access the results.\", \
          \ # noqa: E501\n                ],\n            },\n            {\n    \
          \            \"cell_type\": \"markdown\",\n                \"id\": \"fba16ca7-b15f-4d7a-95b4-d3cf73163440\"\
          ,\n                \"metadata\": {},\n                \"source\": [\"Download\
          \ model binaries and metrics.\"],\n            },\n            {\n     \
          \           \"cell_type\": \"code\",\n                \"execution_count\"\
          : None,\n                \"id\": \"e88370df-ecda-453d-913a-9524088ccc36\"\
          ,\n                \"metadata\": {},\n                \"outputs\": [],\n\
          \                \"source\": [\n                    \"import boto3\\n\"\
          ,\n                    \"import os\\n\",\n                    \"\\n\",\n\
          \                    \"s3 = boto3.resource('s3', endpoint_url=os.environ['AWS_S3_ENDPOINT'])\\\
          n\",\n                    \"bucket = s3.Bucket(os.environ['AWS_S3_BUCKET'])\\\
          n\",\n                    \"\\n\",\n                    'full_refit_prefix\
          \ = os.path.join(pipeline_name, run_id, \"autogluon-models-full-refit\"\
