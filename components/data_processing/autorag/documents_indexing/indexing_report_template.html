<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Documents Indexing Report</title>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a2332;
    --surface-hover: #243044;
    --border: #2d3a4f;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --success: #3fb950;
    --danger: #f85149;
    --gold: #f0b429;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
    line-height: 1.6;
  }
  .container { max-width: 960px; margin: 0 auto; }
  header { margin-bottom: 2rem; }
  header h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
  .stats {
    display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1.5rem;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.5rem;
    flex: 1 1 0;
    min-width: 140px;
    text-align: center;
  }
  .stat .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 0.25rem;
  }
  .stat .value { font-size: 1.5rem; font-weight: 700; }
  .stat .value.success { color: var(--success); }
  .stat .value.danger { color: var(--danger); }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  }
  .card h2 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 1rem;
    font-weight: 600;
  }
  .settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1rem;
  }
  .settings-group h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--accent);
    margin-bottom: 0.5rem;
    font-weight: 600;
  }
  .settings-group dl { font-size: 0.85rem; }
  .settings-group dt {
    color: var(--text-muted);
    font-size: 0.75rem;
    margin-top: 0.4rem;
  }
  .settings-group dd { margin-left: 0; font-weight: 500; }
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  thead th {
    text-transform: uppercase;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    background: var(--surface-hover);
    color: var(--text-muted);
    padding: 0.75rem 1rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tbody tr:hover { background: var(--surface-hover); }
  .badge {
    display: inline-block;
    padding: 0.15rem 0.6rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge-success { background: rgba(63,185,80,0.15); color: var(--success); }
  .badge-danger { background: rgba(248,81,73,0.15); color: var(--danger); }
  .muted { color: var(--text-muted); }
  .empty-msg { color: var(--text-muted); font-style: italic; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Documents Indexing Report</h1>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="label">Total Documents</div>
      <div class="value">__TOTAL_DOCUMENTS__</div>
    </div>
    <div class="stat">
      <div class="label">Completed</div>
      <div class="value success">__COMPLETED__</div>
    </div>
    <div class="stat">
      <div class="label">Failed</div>
      <div class="value__FAILED_CLASS__">__FAILED__</div>
    </div>
    <div class="stat">
      <div class="label">Total Chunks</div>
      <div class="value">__TOTAL_CHUNKS__</div>
    </div>
  </div>

  <div class="card">
    <h2>Settings</h2>
    <div class="settings-grid">
      __SETTINGS_HTML__
    </div>
  </div>

  __TABLE_HTML__
</div>
</body>
</html>
